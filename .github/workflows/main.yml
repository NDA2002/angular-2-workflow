name: angular 2 workflow

on: 
  push: 
   branches: [ main ]

jobs: 
  build-angular-app:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22.x
      - name:  Install Dependencies
        run: npm install
      - name: Build Angular App
        run: npm run build
        
  
